# Production Docker Compose Configuration
version: '3.8'

services:
  finance-dashboard:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: finance-dashboard-prod
    restart: unless-stopped
    ports:
      - "80:8000"
    environment:
      - PYTHONUNBUFFERED=1
      - ENVIRONMENT=production
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 30s
